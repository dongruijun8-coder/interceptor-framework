<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>截流看板 · 任务详情</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#F5F5F7; --surface:rgba(255,255,255,0.72); --surface-2:rgba(255,255,255,0.90);
  --border:rgba(0,0,0,0.08); --accent:#007AFF; --accent-bg:rgba(0,122,255,0.08);
  --success:#34C759; --success-bg:rgba(52,199,89,0.10);
  --warning:#FF9500; --warning-bg:rgba(255,149,0,0.10);
  --danger:#FF3B30; --danger-bg:rgba(255,59,48,0.10);
  --text:#1D1D1F; --text-muted:#86868B;
  --shadow-sm:0 1px 3px rgba(0,0,0,0.04),0 1px 2px rgba(0,0,0,0.06);
  --shadow-md:0 4px 12px rgba(0,0,0,0.06),0 2px 4px rgba(0,0,0,0.04);
  --shadow-lg:0 12px 32px rgba(0,0,0,0.10),0 4px 8px rgba(0,0,0,0.04);
  --easing:cubic-bezier(0.16,1,0.3,1);
  --radius-lg:20px; --radius-md:16px; --radius-sm:10px;
  --font:'Inter','PingFang SC','Microsoft YaHei',system-ui,sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;-webkit-font-smoothing:antialiased}
.hidden{display:none!important}

.topbar{background:rgba(255,255,255,0.72);backdrop-filter:blur(20px) saturate(180%);-webkit-backdrop-filter:blur(20px) saturate(180%);border-bottom:1px solid var(--border);padding:0 24px;height:52px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;z-index:10}
.topbar .back{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--accent);cursor:pointer;font-weight:500;transition:opacity .15s;background:none;border:none;font-family:var(--font)}
.topbar .back:hover{opacity:.7}
.topbar .back svg{width:16px;height:16px}
.topbar .title{font-size:14px;font-weight:600;letter-spacing:-0.2px}
.topbar .title .dot{width:7px;height:7px;border-radius:50%;display:inline-block;margin-right:7px}
.topbar .title .dot-run{background:var(--success);animation:dotPulse 2s infinite}
.topbar .title .dot-pause{background:var(--warning)}
@keyframes dotPulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.8)}}
.topbar .right{display:flex;gap:8px;align-items:center}

.main{display:flex;flex:1;overflow:hidden}
.panel{background:transparent;border-right:1px solid var(--border);overflow-y:auto;overflow-x:hidden;flex-shrink:0}
.panel:last-child{border-right:none}
.panel-left{width:260px}
.panel-center{flex:1;min-width:0}
.panel-right{width:320px}

.panel-header{font-size:11px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.8px;padding:18px 20px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.panel-header .count{font-size:11px;color:var(--text-muted);font-weight:400;text-transform:none;letter-spacing:0}

.room-item{padding:13px 20px;border-bottom:1px solid rgba(0,0,0,0.03);display:flex;align-items:center;justify-content:space-between;transition:background .15s;cursor:pointer}
.room-item:hover{background:rgba(0,0,0,0.02)}
.room-item.active{background:var(--accent-bg);border-left:2px solid var(--accent);padding-left:18px}
.room-item .ri-name{font-size:13px;font-weight:500}
.room-item .ri-meta{font-size:11px;color:var(--text-muted);margin-top:2px}
.ri-badge{font-size:10px;padding:3px 10px;border-radius:10px;font-weight:500;white-space:nowrap;flex-shrink:0}
.ri-done{background:var(--success-bg);color:var(--success)}
.ri-prog{background:var(--accent-bg);color:var(--accent)}
.ri-wait{color:var(--text-muted)}
.room-list-footer{padding:14px 20px;text-align:center}
.room-list-footer a{font-size:12px;color:var(--accent);cursor:pointer;text-decoration:none}
.room-list-footer a:hover{text-decoration:underline}

.ranking-table{width:100%;border-collapse:collapse;font-size:13px}
.ranking-table th{text-align:left;padding:10px 16px;font-size:10px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--border);position:sticky;top:0;background:rgba(245,245,247,0.92);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);z-index:1}
.ranking-table td{padding:10px 16px;border-bottom:1px solid rgba(0,0,0,0.03)}
.ranking-table tbody tr{transition:background 0.25s, opacity 0.25s}
.ranking-table tbody tr:hover{background:rgba(0,0,0,0.02)}
.ranking-table .rn{font-weight:500;color:var(--text-muted);font-size:12px;width:32px;text-align:center}
.ranking-table .rn.top{color:var(--warning)}
.ranking-table .uid{font-family:ui-monospace,'SF Mono','Cascadia Code',monospace;font-size:11px;color:var(--text-muted)}
.ranking-table .amount{font-weight:500;text-align:right}
.ranking-table .gender{text-align:center;font-size:13px;width:40px}
.ranking-table .gender.male{color:#007AFF}
.ranking-table .gender.female{color:#FF2D55}
.ranking-table .gender.unknown{color:var(--text-muted)}
.row-sent{opacity:.32}
.row-sent td{text-decoration:line-through;text-decoration-color:var(--success)}
.row-fail td{color:var(--danger);border-left:2px solid var(--danger)}
.row-sending td{animation:sendPulse 1.5s ease-in-out infinite}
@keyframes sendPulse{0%,100%{background:var(--accent-bg)}50%{background:rgba(0,122,255,0.15)}}
.status-tag{font-size:10px;padding:3px 10px;border-radius:10px;font-weight:500;white-space:nowrap;transition:all 0.2s var(--easing)}
.tag-sent{background:var(--success-bg);color:var(--success)}
.tag-fail{background:var(--danger-bg);color:var(--danger)}
.tag-sending{background:var(--accent-bg);color:var(--accent)}
.empty-note{padding:40px;text-align:center;color:var(--text-muted);font-size:13px}

.send-section{padding:18px 20px;border-bottom:1px solid var(--border)}
.send-section h4{font-size:11px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.8px;margin-bottom:14px}
.setting-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;font-size:13px}
.setting-row label{color:var(--text-muted)}
.setting-row input,.setting-row select{width:120px;background:rgba(0,0,0,0.03);border:1px solid var(--border);color:var(--text);padding:6px 10px;border-radius:8px;font-size:12px;font-family:var(--font)}
.setting-row input:focus,.setting-row select:focus{outline:none;border-color:var(--accent)}
.tpl-item{font-size:12px;padding:7px 12px;background:rgba(0,0,0,0.02);border-radius:8px;margin-bottom:6px;cursor:pointer;transition:background .15s;border:1px solid transparent}
.tpl-item:hover{border-color:var(--border);background:rgba(0,0,0,0.04)}
.tpl-item .nick{color:var(--accent);font-weight:500}
.log-item{padding:8px 20px;border-bottom:1px solid rgba(0,0,0,0.02);font-size:12px;display:flex;gap:8px;align-items:flex-start}
.log-time{font-family:ui-monospace,'SF Mono',monospace;font-size:10px;color:var(--text-muted);white-space:nowrap;flex-shrink:0}
.log-ok .log-msg{color:var(--success)}
.log-err .log-msg{color:var(--danger)}
.log-info .log-msg{color:var(--text-muted)}
.log-msg{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
#logList{max-height:260px;overflow-y:auto}
#logList::-webkit-scrollbar{width:3px}
#logList::-webkit-scrollbar-thumb{background:rgba(0,0,0,0.12);border-radius:3px}

.pb-today{font-size:12px;color:var(--text-muted);display:flex;gap:16px}
.pb-today b{color:var(--text);font-weight:600}

.btn{font-size:12px;padding:7px 16px;border-radius:var(--radius-sm);font-weight:500;cursor:pointer;border:none;transition:all .15s var(--easing);font-family:var(--font);display:inline-flex;align-items:center;gap:5px;letter-spacing:-0.1px}
.btn:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
.btn:active{transform:scale(0.97)}
.btn-success{background:var(--success);color:#fff}
.btn-success:hover{filter:brightness(1.08);box-shadow:0 2px 12px rgba(52,199,89,0.25)}
.btn-warning{background:var(--warning);color:#fff}
.btn-warning:hover{filter:brightness(1.08);box-shadow:0 2px 12px rgba(255,149,0,0.25)}
.btn-danger{background:var(--danger);color:#fff}
.btn-danger:hover{filter:brightness(1.08);box-shadow:0 2px 12px rgba(255,59,48,0.25)}
.btn-ghost{background:transparent;border:1px solid var(--border);color:var(--text)}
.btn-ghost:hover{border-color:rgba(0,0,0,0.18);background:rgba(0,0,0,0.03)}
.btn-xs{font-size:10px;padding:4px 12px}

.pbar{background:rgba(255,255,255,0.72);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:11px 24px;display:flex;align-items:center;gap:14px;flex-shrink:0;font-size:13px}
.pbar .pb-track{flex:1;max-width:280px;background:rgba(0,0,0,0.05);border-radius:3px;height:5px;overflow:hidden}
.pbar .pb-fill{height:100%;border-radius:3px;background:var(--accent);transition:width .6s var(--easing)}
.pbar .pb-stat{font-size:12px;font-weight:500}
.pbar .pb-stat .ok{color:var(--success)}
.pbar .pb-stat .fl{color:var(--danger)}

.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.2);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;z-index:200;animation:fadeIn .2s ease-out}
.modal{background:var(--surface-2);backdrop-filter:blur(40px);-webkit-backdrop-filter:blur(40px);border:1px solid var(--border);border-radius:var(--radius-lg);padding:28px 30px;width:90%;max-width:440px;animation:modalIn .4s var(--easing);box-shadow:var(--shadow-lg)}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes modalIn{from{opacity:0;transform:scale(.92) translateY(12px)}to{opacity:1;transform:scale(1) translateY(0)}}
.modal h3{font-size:18px;font-weight:600;margin-bottom:22px;letter-spacing:-0.3px}
.modal label{font-size:12px;color:var(--text-muted);display:block;margin:14px 0 5px;font-weight:500}
.modal input,.modal textarea{width:100%;background:rgba(0,0,0,0.03);border:1px solid var(--border);color:var(--text);padding:9px 12px;border-radius:8px;font-size:13px;font-family:var(--font);transition:border-color .15s}
.modal input:focus,.modal textarea:focus{outline:none;border-color:var(--accent)}
.modal textarea{resize:vertical}
.modal .btn-row{display:flex;gap:8px;margin-top:22px;justify-content:flex-end}
#credsList h4{font-size:12px;color:var(--accent);margin:14px 0 6px;text-transform:uppercase;letter-spacing:.5px}
.cred-row{display:flex;gap:10px;padding:6px 8px;border-bottom:1px solid var(--border);font-size:12px;word-break:break-all}
.cred-row:hover{background:var(--surface)}
.cred-key{color:var(--text-muted);min-width:100px;max-width:140px;flex-shrink:0;font-weight:500}
.cred-val{color:var(--text);font-family:ui-monospace,'SF Mono',monospace;font-size:11px}
.cred-card{border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:12px}
.cred-item{display:flex;align-items:flex-start;padding:10px 14px;border-bottom:1px solid var(--border);gap:12px}
.cred-item:last-child{border-bottom:none}
.cred-label{font-size:11px;color:var(--text-muted);min-width:64px;flex-shrink:0;font-weight:500;text-transform:uppercase;letter-spacing:.5px;padding-top:2px}
.cred-value{font-size:12px;font-family:ui-monospace,'SF Mono',monospace;word-break:break-all;line-height:1.4}
.cred-toggle{font-size:12px;color:var(--accent);cursor:pointer;margin-top:4px;user-select:none}
.cred-toggle:hover{text-decoration:underline}

.panel::-webkit-scrollbar{width:4px}
.panel::-webkit-scrollbar-track{background:transparent}
.panel::-webkit-scrollbar-thumb{background:rgba(0,0,0,0.10);border-radius:4px}
.panel::-webkit-scrollbar-thumb:hover{background:rgba(0,0,0,0.18)}

@media(max-width:1024px){.main{flex-direction:column}.panel-left,.panel-right{width:100%;max-height:180px;border-right:none;border-bottom:1px solid var(--border)}.panel-center{flex:1}}
</style>
</head>
<body>

<header class="topbar">
  <button class="back" onclick="goBack()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
    返回看板
  </button>
  <div class="title" id="topTitle"><span class="dot dot-run"></span><span id="appLabel">加载中...</span></div>
  <div class="right">
    <div class="btn btn-success btn-xs hidden" id="btnStart" onclick="startTask()">开始</div>
    <div class="btn btn-warning btn-xs hidden" id="btnPause" onclick="togglePause()">暂停</div>
    <div class="btn btn-success btn-xs hidden" id="btnResume" onclick="toggleResume()">继续</div>
    <div class="btn btn-danger btn-xs hidden" id="btnStop" onclick="stopTask()">停止</div>
    <div class="btn btn-ghost btn-xs" onclick="scanRooms()">扫描房间</div>
    <div class="btn btn-ghost btn-xs" onclick="openSettings()">设置</div>
    <div class="btn btn-ghost btn-xs" onclick="extractCreds()" id="btnExtract" style="margin-left:4px">🔑 提取凭证</div>
  </div>
</header>

<div class="pbar">
  <span style="color:var(--text-muted);font-size:12px">进度</span>
  <span class="pb-stat" id="pbLabel">0 / 0</span>
  <div class="pb-track"><div class="pb-fill" id="pbFill" style="width:0%"></div></div>
  <span class="pb-stat">已发 <span class="ok" id="pbSent">0</span></span>
  <span class="pb-stat">失败 <span class="fl" id="pbFailed">0</span></span>
  <span class="pb-today">今日已发 <b id="pbTodaySent">0</b> 人</span>
  <span style="font-size:12px;color:var(--text-muted);margin-left:auto" id="pbRoom">—</span>
</div>

<div class="main">
  <!-- Left: Rooms -->
  <div class="panel panel-left">
    <div class="panel-header">房间列表 <span class="count" id="roomCount">—</span></div>
    <div id="roomList"><div class="empty-note">等待任务启动...</div></div>
    <div class="room-list-footer hidden" id="roomFooter"><a href="#">查看全部 &rarr;</a></div>
  </div>

  <!-- Center: Ranking -->
  <div class="panel panel-center">
    <div class="panel-header" id="rankingTitle">贡献榜 <span class="count" id="rankingCount">—</span></div>
    <div id="rankingBody"><div class="empty-note">等待任务启动...</div></div>
  </div>

  <!-- Right: Send Panel + Log -->
  <div class="panel panel-right">
    <div class="send-section">
      <h4>发送设置</h4>
      <div class="setting-row" id="rowUserSource"><label>用户来源</label><select id="cfgUserSource" onchange="onSourceChange()"></select></div>
      <div class="setting-row hidden" id="rowDataSource"><label>排行类型</label><select id="cfgSource" onchange="onSettingChange()"></select></div>
      <div class="setting-row hidden" id="rowPeriod"><label>时段</label><select id="cfgPeriod" onchange="onSettingChange()"></select></div>
      <div class="setting-row hidden" id="rowGender"><label>性别</label><select id="cfgGender" onchange="onSettingChange()"></select></div>
      <div class="setting-row"><label>间隔</label><input type="number" id="cfgInterval" value="3" min="1" max="60" onchange="onSettingChange()"> 秒</div>
    </div>
    <div class="send-section">
      <h4>话术模板</h4>
      <div id="tplList"></div>
      <div class="tpl-item" style="color:var(--text-muted);text-align:center;border:1px dashed var(--border);background:transparent">+ 添加话术</div>
    </div>
    <div class="send-section" style="border-bottom:none;padding-top:0"><h4>发送日志</h4></div>
    <div id="logList"><div class="empty-note">等待任务启动...</div></div>
  </div>
</div>

<!-- Creds Result Modal -->
<div class="modal-overlay hidden" id="credsModal" onclick="if(event.target===this)closeCreds()">
<div class="modal" style="max-width:440px;max-height:80vh;overflow-y:auto">
  <h3>凭证提取</h3>
  <div id="credsList" style="font-size:13px"></div>
  <div class="btn-row"><div class="btn btn-ghost" onclick="closeCreds()">关闭</div></div>
</div></div>

<div class="modal-overlay hidden" id="settingsModal">
<div class="modal" style="max-width:480px;max-height:90vh;overflow-y:auto">
  <h3 id="settingsTitle">设置</h3>
  <label>Token</label><input type="text" id="setToken" placeholder="access token">
  <label>UID</label><input type="text" id="setUid" placeholder="用户 UID">
  <label>设备 ID</label><input type="text" id="setDeviceId" placeholder="device_id / android_id">
  <label>数美设备 ID</label><input type="text" id="setShumeiDid" placeholder="shumei_device_id（可选）">
  <label>发信间隔（秒）</label><input type="number" id="setInterval" value="3" min="1" max="60">
  <label>话术模板（一行一条）</label>
  <textarea id="setTemplates" style="height:80px"></textarea>
  <div class="btn-row">
    <div class="btn btn-ghost" onclick="closeSettings()">关闭</div>
    <div class="btn btn-success" onclick="saveSettings()">保存</div>
  </div>
</div></div>

<script>
var APP_ID = window.location.pathname.split('/app/')[1] || 'piaopiao';
var appData = null;
var timer = null;

// ═══ Init ═══
window.addEventListener('load', function() {
  document.getElementById('settingsTitle').textContent = APP_ID + ' 设置';
  fetchApp();
  timer = setInterval(fetchApp, 3000);
});

function fetchApp() {
  fetch('/api/app/' + encodeURIComponent(APP_ID))
    .then(function(r) { return r.json(); })
    .then(function(d) {
      if (d.error) return;
      var old = appData;
      appData = d;
      if (!old) fullRender();
      else patchRender(old);
    });
}

function fullRender() {
  _lastRankingRoom = '';
  _knownLogKeys = {};
  updateTopBar();
  updateProgress();
  updateRooms();
  updateRanking(true);
  updateSettings();
  updateTemplates();
}

function patchRender(old) {
  if (old.status !== appData.status) updateTopBar();
  var roomChanged = (old.current_room !== appData.current_room);
  if (old.done_rooms !== appData.done_rooms || old.sent !== appData.sent || old.failed !== appData.failed || roomChanged) {
    updateProgress();
    updateRooms();
  }
  // Full rebuild on room change, incremental on status changes
  if (roomChanged) {
    updateRanking(true);
  } else {
    var oldUsers = JSON.stringify(old.ranking_users || []);
    var newUsers = JSON.stringify(appData.ranking_users || []);
    if (oldUsers !== newUsers) updateRanking(false);
  }
  // Log: only update if new entries
  var oldLen = (old.recent_sent||[]).length + (old.recent_failed||[]).length;
  var newLen = (appData.recent_sent||[]).length + (appData.recent_failed||[]).length;
  if (newLen !== oldLen) updateLog();
}

function updateTopBar() {
  var s = appData.status;
  var dotEl = document.querySelector('.topbar .title .dot');
  dotEl.className = 'dot ' + (s === 'running' ? 'dot-run' : s === 'paused' ? 'dot-pause' : '');
  document.getElementById('appLabel').textContent = appData.app_name;
  document.getElementById('btnStart').classList.toggle('hidden', s !== 'idle');
  document.getElementById('btnPause').classList.toggle('hidden', s !== 'running');
  document.getElementById('btnResume').classList.toggle('hidden', s !== 'paused');
  document.getElementById('btnStop').classList.toggle('hidden', s === 'idle');
}

function updateProgress() {
  var a = appData;
  var cfg = a.current_source_cfg || {};
  var isGlobal = cfg.type === 'global';

  if (isGlobal) {
    var total = a.total_users || 0;
    var sent = a.sent || 0;
    var pct = total ? Math.round(sent / total * 100) : 0;
    document.getElementById('pbLabel').textContent = sent + ' / ' + total + ' 人';
    document.getElementById('pbFill').style.width = pct + '%';
    document.getElementById('pbRoom').textContent = '全站模式';
  } else {
    var pct = a.total_rooms ? Math.round((a.done_rooms||0) / (a.total_rooms||0) * 100) : 0;
    document.getElementById('pbLabel').textContent = (a.done_rooms||0) + ' / ' + (a.total_rooms||0) + ' 间';
    document.getElementById('pbFill').style.width = pct + '%';
    document.getElementById('pbRoom').textContent = a.current_room ? ('当前: ' + a.current_room) : '—';
  }

  document.getElementById('pbSent').textContent = a.sent || 0;
  document.getElementById('pbFailed').textContent = a.failed || 0;
  document.getElementById('pbTodaySent').textContent = a.sent_today_total || 0;
}

function updateRooms() {
  var a = appData;
  var cfg = a.current_source_cfg || {};
  var isGlobal = cfg.type === 'global';
  var panelHeader = document.querySelector('.panel-left .panel-header');

  if (isGlobal) {
    panelHeader.innerHTML = '全站榜单';
    var roomList = document.getElementById('roomList');
    roomList.innerHTML =
      '<div style="padding:20px;text-align:center">' +
      '<div style="font-size:28px;margin-bottom:8px">&#x1F3C6;</div>' +
      '<div style="font-size:14px;font-weight:600;margin-bottom:4px">' + (a.user_source || '') + '</div>' +
      '<div style="font-size:12px;color:var(--text-muted);margin-bottom:16px">' +
        (a.data_source || '') + ' · ' + (a.period || '') +
      '</div>' +
      '<div style="display:flex;justify-content:space-around;font-size:12px">' +
      '<div><div style="font-size:22px;font-weight:600">' + (a.total_users || 0) + '</div><div style="color:var(--text-muted)">已拉取</div></div>' +
      '<div><div style="font-size:22px;font-weight:600;color:var(--success)">' + (a.sent || 0) + '</div><div style="color:var(--text-muted)">已发送</div></div>' +
      '<div><div style="font-size:22px;font-weight:600;color:var(--danger)">' + (a.failed || 0) + '</div><div style="color:var(--text-muted)">失败</div></div>' +
      '</div></div>';
    document.getElementById('roomFooter').classList.add('hidden');
  } else {
    panelHeader.innerHTML = '房间列表 <span class="count" id="roomCount">' + (a.done_rooms||0) + ' / ' + (a.total_rooms||0) + '</span>';
    var html = '';
    if ((a.total_rooms||0) === 0) {
      html = '<div class="empty-note">等待房间扫描...</div>';
    } else if (a.done_rooms === a.total_rooms) {
      html = '<div class="empty-note">全部房间已完成</div>';
    } else {
      html += '<div class="room-item active"><div><div class="ri-name">' + (a.current_room || '进行中...') + '</div><div class="ri-meta">排名 · 已发 ' + (a.sent||0) + ' 人</div></div><span class="ri-badge ri-prog">进行中</span></div>';
      var remaining = (a.total_rooms||0) - (a.done_rooms||0) - 1;
      if (remaining > 0) html += '<div class="room-item"><div><div class="ri-name">剩余 ' + remaining + ' 间</div><div class="ri-meta">待遍历</div></div><span class="ri-badge ri-wait">等待</span></div>';
    }
    document.getElementById('roomList').innerHTML = html;
    document.getElementById('roomFooter').classList.toggle('hidden', (a.total_rooms||0) === 0);
  }
}

var _lastRankingRoom = '';

function updateRanking(forceFull) {
  var cfg = appData.current_source_cfg || {};
  var isGlobal = cfg.type === 'global';
  var title = (appData.user_source || '榜单') + ' · ' + (appData.data_source || '') + ' · ' + (appData.period || '');
  if (!isGlobal && appData.current_room) title += ' · ' + appData.current_room;
  document.getElementById('rankingTitle').innerHTML = title + ' <span class="count">' + (appData.done_rooms||0) + '/' + (appData.total_rooms||0) + '</span>';

  var users = appData.ranking_users || [];
  var currentRoom = appData.current_room || '';
  var roomChanged = (currentRoom !== _lastRankingRoom);
  if (forceFull) roomChanged = true;

  // Full rebuild: empty table, room changed, or first load
  if (roomChanged || !document.querySelector('#rankingBody table')) {
    _lastRankingRoom = currentRoom;
    var html = '<table class="ranking-table"><thead><tr><th>#</th><th>用户</th><th>UID</th><th>性别</th><th style="text-align:right">贡献</th><th>状态</th></tr></thead><tbody>';
    if (users.length === 0) {
      html += '<tr><td colspan="6" class="empty-note">排行数据将在房间遍历时实时显示</td></tr>';
    } else {
      users.forEach(function(u, i) {
        html += buildRankingRow(u, i);
      });
    }
    html += '</tbody></table>';
    document.getElementById('rankingBody').innerHTML = html;
  } else {
    // Incremental: update existing rows in-place
    var tbody = document.querySelector('#rankingBody tbody');
    if (!tbody) { updateRanking(true); return; }
    users.forEach(function(u, i) {
      var row = tbody.querySelector('tr[data-uid="' + u.uid + '"]');
      if (!row) {
        // New user row — rebuild (shouldn't happen in same room)
        updateRanking(true); return;
      }
      var st = u.status || 'wait';
      var rowClass = st === 'sent' ? 'row-sent' : st === 'sending' ? 'row-sending' : st === 'failed' ? 'row-fail' : '';
      var tagClass = 'status-tag ' + (st === 'sent' ? 'tag-sent' : st === 'sending' ? 'tag-sending' : st === 'failed' ? 'tag-fail' : '');
      var tagText = st === 'sent' ? '已发' : st === 'sending' ? '发送中' : st === 'failed' ? '失败' : '—';
      // Only update if changed (avoids DOM thrashing)
      if (row.className !== rowClass) row.className = rowClass;
      var tag = row.querySelector('.status-tag');
      if (tag && (tag.textContent !== tagText || tag.className !== tagClass)) {
        tag.textContent = tagText;
        tag.className = tagClass;
      }
    });
  }

  updateLog();
}

function buildRankingRow(u, i) {
  var st = u.status || 'wait';
  var rowClass = st === 'sent' ? 'row-sent' : st === 'sending' ? 'row-sending' : st === 'failed' ? 'row-fail' : '';
  var tagClass = 'status-tag ' + (st === 'sent' ? 'tag-sent' : st === 'sending' ? 'tag-sending' : st === 'failed' ? 'tag-fail' : '');
  var tagText = st === 'sent' ? '已发' : st === 'sending' ? '发送中' : st === 'failed' ? '失败' : '—';
  // Gender icon + color
  var g = u.gender;
  var genderHtml = '';
  if (g === 1 || g === '1') genderHtml = '<td class="gender male">♂</td>';
  else if (g === 2 || g === '2') genderHtml = '<td class="gender female">♀</td>';
  else genderHtml = '<td class="gender unknown">—</td>';
  return '<tr class="' + rowClass + '" data-uid="' + (u.uid || '') + '">'
    + '<td class="rn">' + (i + 1) + '</td>'
    + '<td>' + (u.nick || '') + '</td>'
    + '<td class="uid">' + (u.uid || '') + '</td>'
    + genderHtml
    + '<td class="amount">' + (u.amount || 0) + '</td>'
    + '<td><span class="' + tagClass + '">' + tagText + '</span></td>'
    + '</tr>';
}

var _knownLogKeys = {};  // time+uid key → already rendered
var _logSeq = 0;

function updateLog() {
  var sent = appData.recent_sent || [];
  var failed = appData.recent_failed || [];
  var logList = document.getElementById('logList');
  var wasAtTop = logList.scrollTop < 30;

  // Build ordered list, newest first
  var all = [];
  sent.forEach(function(e) { all.push({type:'sent', time:e.time, uid:e.uid, nick:e.nick, text:e.text||''}); });
  failed.forEach(function(e) { all.push({type:'failed', time:e.time, uid:e.uid, nick:e.nick, error:e.error||''}); });
  all.sort(function(a,b) { return b.time.localeCompare(a.time); });

  var hasNew = false;
  all.slice(0, 30).forEach(function(e) {
    var key = e.time + '|' + e.uid;
    if (_knownLogKeys[key]) return;
    _knownLogKeys[key] = true;
    hasNew = true;
    var div = document.createElement('div');
    div.style.cssText = 'font-size:12px;padding:5px 0;border-bottom:1px solid rgba(0,0,0,0.04)';
    if (e.type === 'sent') {
      div.innerHTML = '<span class="status-tag tag-sent">✓</span> <b>' + e.nick + '</b> (' + e.uid + ') ' + e.text + ' <span style="color:var(--text-muted);float:right;margin-left:4px">' + e.time + '</span>';
    } else {
      div.innerHTML = '<span class="status-tag tag-fail">✗</span> <b>' + e.nick + '</b> (' + e.uid + ') ' + e.error + ' <span style="color:var(--text-muted);float:right;margin-left:4px">' + e.time + '</span>';
    }
    logList.insertBefore(div, logList.firstChild);
  });

  // Trim old entries beyond 30
  while (logList.children.length > 30) {
    logList.removeChild(logList.lastChild);
  }

  // Auto-scroll to top if user is at top, otherwise preserve position
  if (hasNew && wasAtTop) logList.scrollTop = 0;

  // Show empty state
  if (logList.children.length === 0 && !hasNew) {
    logList.innerHTML = '<div class="empty-note">等待任务启动...</div>';
    _knownLogKeys = {};
  }

  // Clear empty note if we have items
  if (hasNew && logList.querySelector('.empty-note')) {
    logList.querySelector('.empty-note').remove();
  }
}

function updateSettings() {
  document.getElementById('cfgInterval').value = appData.interval || 3;

  // --- User source dropdown ---
  var srcs = appData.available_user_sources || {};
  var srcKeys = Object.keys(srcs);
  var srcEl = document.getElementById('cfgUserSource');
  var prevVal = srcEl.value;
  srcEl.innerHTML = '';
  if (srcKeys.length === 0) {
    var o = document.createElement('option');
    o.value = ''; o.textContent = '(未配置)'; o.disabled = true;
    srcEl.appendChild(o);
  } else {
    srcKeys.forEach(function(k) {
      var cfg = srcs[k];
      var o = document.createElement('option');
      o.value = k;
      o.textContent = k + (!cfg.endpoint ? ' (待实现)' : '');
      o.disabled = false;
      if (k === appData.user_source) o.selected = true;
      srcEl.appendChild(o);
    });
  }
  // Restore selection if still valid and unchanged by backend
  if (prevVal && srcKeys.indexOf(prevVal) >= 0 && prevVal !== appData.user_source) {
    srcEl.value = prevVal;
  }

  // Runtime disable source switch
  var isRunning = appData.status === 'running';
  srcEl.disabled = isRunning;

  // Dynamic filter visibility
  var cfg = appData.current_source_cfg || {};
  var filters = cfg.filters || [];
  document.getElementById('rowDataSource').classList.toggle('hidden', filters.indexOf('data_source') === -1);
  document.getElementById('rowPeriod').classList.toggle('hidden', filters.indexOf('period') === -1);
  document.getElementById('rowGender').classList.toggle('hidden', filters.indexOf('gender') === -1);

  // --- Existing dropdowns (populate when visible) ---
  if (filters.indexOf('data_source') >= 0) {
    var opts = appData.available_data_sources || {};
    var keys = Object.keys(opts);
    if (!keys.length) keys = [appData.data_source || '—'];
    var dsEl = document.getElementById('cfgSource');
    dsEl.innerHTML = '';
    keys.forEach(function(k) { var o = document.createElement('option'); o.value = k; o.textContent = k; if (k === appData.data_source) o.selected = true; dsEl.appendChild(o); });
  }

  if (filters.indexOf('period') >= 0) {
    opts = appData.available_periods || {};
    keys = Object.keys(opts);
    if (!keys.length) keys = [appData.period || '—'];
    var perEl = document.getElementById('cfgPeriod');
    perEl.innerHTML = '';
    keys.forEach(function(k) { var o = document.createElement('option'); o.value = k; o.textContent = k; if (k === appData.period) o.selected = true; perEl.appendChild(o); });
  }

  if (filters.indexOf('gender') >= 0) {
    opts = appData.available_genders || {};
    keys = Object.keys(opts);
    if (!keys.length) keys = [appData.gender || '全部'];
    var genEl = document.getElementById('cfgGender');
    genEl.innerHTML = '';
    keys.forEach(function(k) { var o = document.createElement('option'); o.value = k; o.textContent = k; if (k === appData.gender) o.selected = true; genEl.appendChild(o); });
  }
}

function updateTemplates() {
  var tpls = appData.templates || [];
  if (!tpls.length) tpls = ['无话术，请在设置中添加'];
  var html = '';
  tpls.forEach(function(t) {
    html += '<div class="tpl-item">' + t + '</div>';
  });
  document.getElementById('tplList').innerHTML = html;
}

// ═══ Actions ═══
function goBack() { window.location.href = '/'; }
function togglePause() { fetch('/api/app/' + encodeURIComponent(APP_ID) + '/pause', {method:'POST'}).then(function(){ fetchApp(); }); }
function startTask() { fetch('/api/app/' + encodeURIComponent(APP_ID) + '/start', {method:'POST'}).then(function(r){ return r.json(); }).then(function(d){ if(d.error) alert(d.error); fetchApp(); }); }
function toggleResume() { fetch('/api/app/' + encodeURIComponent(APP_ID) + '/start', {method:'POST'}).then(function(){ fetchApp(); }); }
function stopTask() { if (confirm('确认停止？进度将重置。')) { fetch('/api/app/' + encodeURIComponent(APP_ID) + '/stop', {method:'POST'}).then(function(){ fetchApp(); }); } }
function scanRooms() {
  document.getElementById('pbLabel').textContent = '扫描中...';
  fetch('/api/app/' + encodeURIComponent(APP_ID) + '/rescan', {method:'POST'})
    .then(function(r){ return r.json(); })
    .then(function(d){
      if (d.success) {
        document.getElementById('pbLabel').textContent = '0 / ' + d.total_rooms + ' 间';
        // Show room count + first 5 rooms in the list
        var html = '<div class="empty-note">共 ' + d.total_rooms + ' 间房</div>';
        var rooms = d.rooms || [];
        rooms.forEach(function(r){
          html += '<div class="room-item"><div><div class="ri-name">' + (r.name || r.id) + '</div><div class="ri-meta">ID: ' + r.id + '</div></div><span class="ri-badge ri-wait">待发</span></div>';
        });
        if (d.total_rooms > 5) html += '<div class="room-item"><div class="ri-name" style="color:var(--text-muted)">... 还有 ' + (d.total_rooms - 5) + ' 间</div></div>';
        document.getElementById('roomList').innerHTML = html;
        document.getElementById('roomCount').textContent = d.total_rooms + ' 间';
        document.getElementById('roomFooter').classList.remove('hidden');
        fetchApp();
      } else {
        document.getElementById('pbLabel').textContent = '扫描失败';
      }
    });
}
function openSettings() {
  var modal = document.getElementById('settingsModal');
  var cred = appData.credentials || {};
  var dev = appData.device || {};
  document.getElementById('setToken').value = cred.token || '';
  document.getElementById('setUid').value = cred.uid || '';
  document.getElementById('setDeviceId').value = dev.device_id || '';
  document.getElementById('setShumeiDid').value = dev.shumei_device_id || '';
  document.getElementById('setInterval').value = appData.interval || 3;
  document.getElementById('setTemplates').value = (appData.templates || ['{nick} 你好~']).join('\n');
  modal.classList.remove('hidden');
}
function closeSettings() { document.getElementById('settingsModal').classList.add('hidden'); }
function saveSettings() {
  var templates = document.getElementById('setTemplates').value.split('\n').filter(function(l) { return l.trim(); });
  var interval = parseInt(document.getElementById('setInterval').value) || 5;
  var body = {
    templates: templates,
    send_interval: interval,
    credentials: {
      token: document.getElementById('setToken').value.trim(),
      uid: parseInt(document.getElementById('setUid').value) || 0
    }
  };
  // Also save device_id via device endpoint
  var did = document.getElementById('setDeviceId').value.trim();
  if (did) {
    fetch('/api/app/' + encodeURIComponent(APP_ID) + '/device', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ device_id: did,
        shumei_device_id: document.getElementById('setShumeiDid').value.trim() })
    });
  }
  fetch('/api/app/' + encodeURIComponent(APP_ID) + '/settings', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  }).then(function(r) { return r.json(); }).then(function(d) {
    if (d.success) { closeSettings(); fetchApp(); }
  });
}
function onSourceChange() {
  var newSource = document.getElementById('cfgUserSource').value;
  if (!newSource || newSource === (appData.user_source || '')) return;
  fetch('/api/app/' + encodeURIComponent(APP_ID) + '/settings', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ user_source: newSource })
  }).then(function(r) { return r.json(); }).then(function(d) {
    if (d.error) { alert('切换失败: ' + d.error); fetchApp(); return; }
    fetchApp();
  });
}

function onSettingChange() {
  var body = {
    send_interval: parseInt(document.getElementById('cfgInterval').value) || 5,
    data_source: document.getElementById('cfgSource').value,
    period: document.getElementById('cfgPeriod').value,
    gender: document.getElementById('cfgGender').value,
  };
  fetch('/api/app/' + encodeURIComponent(APP_ID) + '/settings', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  });
}
document.getElementById('settingsModal').addEventListener('click', function(e) { if (e.target === this) closeSettings(); });
document.addEventListener('keydown', function(e) { if (e.key === 'Escape') { closeSettings(); closeCreds(); } });

function extractCreds() {
  var btn = document.getElementById('btnExtract');
  btn.textContent = '提取中...';
  btn.disabled = true;
  fetch('/api/app/' + encodeURIComponent(APP_ID) + '/extract-creds', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({})
  }).then(function(r) { return r.json(); }).then(function(d) {
    btn.textContent = '🔑 提取凭证';
    btn.disabled = false;
    if (d.success && d.saved) {
      var parts = [];
      if (d.saved.token) parts.push('token ✓');
      if (d.saved.uid) parts.push('uid ✓');
      if (d.saved.device_id) parts.push('device_id ✓');
      showCredsResult(d, parts.length ? '已自动配置: ' + parts.join(', ') : d.saved.message);
    } else {
      showCredsResult(d, '提取失败: ' + (d.error || 'unknown'));
    }
  }).catch(function() {
    btn.textContent = '🔑 提取凭证';
    btn.disabled = false;
  });
}

function showCredsResult(d, summary) {
  var s = d.saved || {};
  var html = '<p style="font-weight:600;margin-bottom:16px">' + esc(s._message || summary) + '</p>';

  // 卡片：只显示已保存的凭证
  html += '<div class="cred-card">';
  if (s.token)  html += '<div class="cred-item"><span class="cred-label">Token</span><span class="cred-value">' + esc(s.token) + '</span></div>';
  if (s.uid)    html += '<div class="cred-item"><span class="cred-label">UID</span><span class="cred-value">' + esc(s.uid) + '</span></div>';
  if (s.device_id) html += '<div class="cred-item"><span class="cred-label">Device ID</span><span class="cred-value">' + esc(s.device_id) + '</span></div>';
  html += '</div>';

  // 原始数据折叠
  html += '<div class="cred-toggle" onclick="var e=document.getElementById(\'credsRaw\');var t=this;if(e.classList.contains(\'hidden\')){e.classList.remove(\'hidden\');t.textContent=\'▲ 收起原始数据\'}else{e.classList.add(\'hidden\');t.textContent=\'▼ 查看原始数据\'}">▼ 查看原始数据</div>';
  html += '<pre id="credsRaw" class="hidden" style="max-height:200px;overflow:auto;font-size:11px;margin-top:8px;background:var(--surface);padding:10px;border-radius:8px;white-space:pre-wrap;word-break:break-all">' + esc(JSON.stringify(d.raw || {}, null, 2)) + '</pre>';

  document.getElementById('credsList').innerHTML = html;
  document.getElementById('credsModal').classList.remove('hidden');
}

function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function closeCreds() { document.getElementById('credsModal').classList.add('hidden'); }
</script>
