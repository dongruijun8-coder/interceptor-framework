<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>截流看板</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:        #F5F5F7;
  --surface:   rgba(255,255,255,0.72);
  --surface-2: rgba(255,255,255,0.90);
  --border:    rgba(0,0,0,0.08);
  --accent:    #007AFF;
  --accent-bg: rgba(0,122,255,0.08);
  --success:   #34C759;
  --success-bg:rgba(52,199,89,0.10);
  --warning:   #FF9500;
  --warning-bg:rgba(255,149,0,0.10);
  --danger:    #FF3B30;
  --danger-bg: rgba(255,59,48,0.10);
  --text:      #1D1D1F;
  --text-muted:#86868B;
  --shadow-sm: 0 1px 3px rgba(0,0,0,0.04), 0 1px 2px rgba(0,0,0,0.06);
  --shadow-md: 0 4px 12px rgba(0,0,0,0.06), 0 2px 4px rgba(0,0,0,0.04);
  --shadow-lg: 0 12px 32px rgba(0,0,0,0.10), 0 4px 8px rgba(0,0,0,0.04);
  --easing:    cubic-bezier(0.16, 1, 0.3, 1);
  --radius-lg: 20px;
  --radius-md: 16px;
  --radius-sm: 10px;
  --font: 'Inter', 'PingFang SC', 'Microsoft YaHei', system-ui, sans-serif;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  padding: 44px 32px 32px;
  -webkit-font-smoothing: antialiased;
}
body::before {
  content: '';
  position: fixed; inset: 0;
  background: radial-gradient(ellipse 60% 50% at 50% 0%, rgba(0,122,255,0.05) 0%, transparent 70%),
              radial-gradient(ellipse 40% 40% at 80% 90%, rgba(52,199,89,0.04) 0%, transparent 70%);
  pointer-events: none; z-index: 0;
}
.container { max-width: 1200px; margin: 0 auto; position: relative; z-index: 1; }

/* ── Header ── */
.header { display:flex; align-items:center; justify-content:space-between; margin-bottom: 28px; flex-wrap:wrap; gap:16px; }
.header h1 { font-size: 26px; font-weight: 700; letter-spacing: -0.4px; }
.header h1 span { color: var(--accent); }
.header .refresh-hint { font-size: 12px; color: var(--text-muted); display:flex; align-items:center; gap:6px; }
.header .refresh-hint .live-dot { width:7px; height:7px; border-radius:50%; background:var(--success); animation:dotPulse 2s infinite; }
@keyframes dotPulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.4;transform:scale(.8)} }

/* ═══ STATS BAR ═══ */
.stats-bar { display:grid; grid-template-columns: repeat(4, 1fr); gap:14px; margin-bottom: 28px; }
.stat-card {
  background: var(--surface); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  border: 1px solid var(--border); border-radius: var(--radius-md);
  padding: 18px 22px; box-shadow: var(--shadow-sm);
  transition: transform .25s var(--easing), box-shadow .25s var(--easing);
}
.stat-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); }
.stat-card .sc-label { font-size: 12px; color: var(--text-muted); font-weight: 500; margin-bottom: 6px; }
.stat-card .sc-value { font-size: 32px; font-weight: 700; letter-spacing: -0.8px; line-height: 1; }
.stat-card .sc-value.ok { color: var(--success); }
.stat-card .sc-value.ac { color: var(--accent); }
.stat-card .sc-sub { font-size: 12px; color: var(--text-muted); margin-top: 4px; }
.stat-card .sc-sub span { font-weight: 500; }

/* ═══ GRID ═══ */
.grid { display:grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 20px; }

/* ═══ CARD ═══ */
.card {
  background: var(--surface); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  border: 1px solid var(--border); border-radius: var(--radius-md);
  padding: 22px 26px; box-shadow: var(--shadow-sm);
  transition: transform .25s var(--easing), box-shadow .25s var(--easing), border-color .3s var(--easing), opacity .3s var(--easing);
  display:flex; flex-direction:column;
  animation: cardIn .5s var(--easing) both;
}
.card:nth-child(1) { animation-delay: 0s; }
.card:nth-child(2) { animation-delay: .05s; }
.card:nth-child(3) { animation-delay: .10s; }
.card:nth-child(4) { animation-delay: .15s; }
@keyframes cardIn { from{opacity:0;transform:translateY(16px) scale(.97)} to{opacity:1;transform:translateY(0) scale(1)} }

.card:hover { transform: translateY(-3px); box-shadow: var(--shadow-lg); border-color: rgba(0,122,255,0.18); }
.card.running { border-color: rgba(52,199,89,0.3); }
.card.paused  { border-color: rgba(255,149,0,0.3); }

.card.empty {
  border:1px dashed rgba(0,0,0,0.10); align-items:center; justify-content:center;
  min-height:230px; cursor:pointer; gap:12px; color:var(--text-muted); background:rgba(255,255,255,0.48);
}
.card.empty:hover { border-color:rgba(0,0,0,0.18); background:rgba(255,255,255,0.72); }
.empty-icon { width:44px; height:44px; opacity:.18; transition:opacity .2s; }
.card.empty:hover .empty-icon { opacity:.30; }

.card-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; }
.card-header .name { font-size:15px; font-weight:600; display:flex; align-items:center; gap:10px; letter-spacing:-0.2px; }
.card-header .name .icon { width:22px; height:22px; color:var(--accent); flex-shrink:0; opacity:.75; }
.card-header .subtitle { font-size:11px; color:var(--text-muted); font-weight:400; }

/* Status badge — transition for smooth changes */
.badge { font-size:11px; padding:5px 12px; border-radius:20px; font-weight:500; white-space:nowrap; display:inline-flex; align-items:center; gap:6px; letter-spacing:-0.1px; transition:all .3s var(--easing); }
.badge-run   { background:var(--success-bg); color:var(--success); }
.badge-pause { background:var(--warning-bg); color:var(--warning); }
.badge-idle  { background:rgba(134,134,139,0.08); color:var(--text-muted); }
.badge-dot { width:6px; height:6px; border-radius:50%; transition:background .3s, box-shadow .3s; }
.badge-run .badge-dot   { background:var(--success); animation:dotPulse 2s infinite; }
.badge-pause .badge-dot { background:var(--warning); }
.badge-idle .badge-dot  { background:var(--text-muted); }

.pb-track { background:rgba(0,0,0,0.05); border-radius:3px; height:5px; margin:12px 0 10px; overflow:hidden; }
.pb-fill  { height:100%; border-radius:3px; transition:width .6s var(--easing); background:var(--accent); }
.pb-fill.done   { background:var(--success); }
.pb-fill.paused { background:var(--warning); }

.stats { display:flex; gap:22px; font-size:13px; margin-bottom:4px; }
.stats .st { color:var(--text-muted); }
.stats .st b { color:var(--text); font-weight:600; }
.stats .st .ok { color:var(--success); font-weight:600; }
.stats .st .fl { color:var(--danger); font-weight:600; }

.current-room { font-size:12px; color:var(--text-muted); margin-bottom:2px; display:flex; align-items:center; gap:5px; }

.meta { display:flex; gap:6px; flex-wrap:wrap; margin-top:6px; }
.meta .tag { font-size:10px; padding:4px 10px; border-radius:6px; background:rgba(0,0,0,0.03); color:var(--text-muted); font-weight:500; }
.meta .tag.hl { background:var(--accent-bg); color:var(--accent); }

.actions { display:flex; gap:8px; margin-top:auto; padding-top:14px; border-top:1px solid var(--border); flex-wrap:wrap; }

/* ═══ BUTTONS ═══ */
.btn { font-size:12px; padding:7px 16px; border-radius:var(--radius-sm); font-weight:500; cursor:pointer; border:none; transition:all .15s var(--easing); font-family:var(--font); display:inline-flex; align-items:center; gap:5px; letter-spacing:-0.1px; }
.btn:focus-visible { outline:2px solid var(--accent); outline-offset:2px; }
.btn:active { transform:scale(0.97); }
.btn-primary { background:var(--accent); color:#fff; }
.btn-primary:hover { filter:brightness(1.08); box-shadow:0 2px 12px rgba(0,122,255,0.25); }
.btn-success { background:var(--success); color:#fff; }
.btn-success:hover { filter:brightness(1.08); box-shadow:0 2px 12px rgba(52,199,89,0.25); }
.btn-warning { background:var(--warning); color:#fff; }
.btn-warning:hover { filter:brightness(1.08); box-shadow:0 2px 12px rgba(255,149,0,0.25); }
.btn-danger  { background:var(--danger); color:#fff; }
.btn-danger:hover  { filter:brightness(1.08); box-shadow:0 2px 12px rgba(255,59,48,0.25); }
.btn-ghost   { background:transparent; border:1px solid var(--border); color:var(--text); }
.btn-ghost:hover { border-color:rgba(0,0,0,0.18); background:rgba(0,0,0,0.03); }
.btn .btn-icon { width:14px; height:14px; flex-shrink:0; }

/* ═══ MODAL ═══ */
.modal-overlay {
  position:fixed; inset:0; background:rgba(0,0,0,0.2); backdrop-filter:blur(8px);
  -webkit-backdrop-filter:blur(8px);
  display:flex; align-items:center; justify-content:center; z-index:100;
  animation:fadeIn .2s ease-out;
}
.modal {
  background:var(--surface-2); backdrop-filter:blur(40px); -webkit-backdrop-filter:blur(40px);
  border:1px solid var(--border); border-radius:var(--radius-lg);
  padding:28px 30px; width:90%; max-width:480px;
  animation:modalIn .4s var(--easing);
  box-shadow:var(--shadow-lg);
}
@keyframes fadeIn  { from{opacity:0} to{opacity:1} }
@keyframes modalIn { from{opacity:0;transform:scale(.92) translateY(12px)} to{opacity:1;transform:scale(1) translateY(0)} }
.modal h3 { font-size:18px; font-weight:600; margin-bottom:22px; letter-spacing:-0.3px; }
.modal label { font-size:12px; color:var(--text-muted); display:block; margin:14px 0 5px; font-weight:500; }
.modal input, .modal select, .modal textarea {
  width:100%; background:rgba(0,0,0,0.03); border:1px solid var(--border);
  color:var(--text); padding:9px 12px; border-radius:8px; font-size:13px; font-family:var(--font);
  transition:border-color .15s;
}
.modal input:focus, .modal select:focus, .modal textarea:focus { outline:none; border-color:var(--accent); }
.modal textarea { resize:vertical; }
.modal .btn-row { display:flex; gap:8px; margin-top:22px; justify-content:flex-end; }
.hidden { display:none !important; }

/* ── Toast ── */
.toast {
  position:fixed; bottom:32px; right:32px; z-index:200;
  background:var(--surface-2); backdrop-filter:blur(24px); -webkit-backdrop-filter:blur(24px);
  border:1px solid var(--border); color:var(--text);
  padding:11px 24px; border-radius:var(--radius-sm); font-size:13px;
  animation:toastIn .4s var(--easing); box-shadow:var(--shadow-md);
}
@keyframes toastIn { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }

@media (max-width: 768px) {
  body { padding:20px 14px; }
  .stats-bar { grid-template-columns: repeat(2, 1fr); }
  .grid { grid-template-columns:1fr; }
  .card, .stat-card { padding:16px 18px; }
}
</style>
</head>
<body>

<div class="container">

  <div class="header">
    <h1>截流<span>看板</span></h1>
    <div class="refresh-hint"><span class="live-dot"></span> 实时更新 · <span id="clock"></span></div>
  </div>

  <!-- ═══ Stats Bar ═══ -->
  <div class="stats-bar" id="statsBar">
    <div class="stat-card">
      <div class="sc-label">今日已发</div>
      <div class="sc-value ok" id="statSent">—</div>
      <div class="sc-sub">私信消息</div>
    </div>
    <div class="stat-card">
      <div class="sc-label">活跃任务</div>
      <div class="sc-value ac" id="statActive">—</div>
      <div class="sc-sub">运行中</div>
    </div>
    <div class="stat-card">
      <div class="sc-label">成功率</div>
      <div class="sc-value" id="statRate">—</div>
      <div class="sc-sub">已发 / 总尝试</div>
    </div>
    <div class="stat-card">
      <div class="sc-label">覆盖房间</div>
      <div class="sc-value" id="statRooms">—</div>
      <div class="sc-sub">今日已遍历</div>
    </div>
  </div>

  <!-- ═══ Task Grid ═══ -->
  <div class="grid" id="taskGrid"></div>

</div>

<!-- Add App Modal -->
<div class="modal-overlay hidden" id="addAppModal">
<div class="modal">
<h3>添加新 App</h3>
<label>App 名称</label><input id="newAppName" placeholder="例如：漂漂、梦音" autocomplete="off">
<label>包名</label><input id="newAppPkg" placeholder="例如：com.example.app" autocomplete="off">
<label>私信方式</label>
<select id="newAppMode">
  <option value="rest">REST API</option>
  <option value="frida_nim">Frida NIM</option>
  <option value="none">纯浏览（不发送）</option>
</select>
<div class="btn-row">
  <div class="btn btn-ghost" onclick="closeAddModal()">取消</div>
  <div class="btn btn-primary" onclick="addApp()">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
    确认添加
  </div>
</div>
</div></div>

<!-- Config Modal -->
<div class="modal-overlay hidden" id="configModal"><div class="modal" id="configContent"></div></div>
<div class="modal-overlay hidden" id="detailModal"><div class="modal" id="detailContent" style="max-width:640px"></div></div>
<div class="toast hidden" id="toast"></div>

<script>
// ═══ SVG Icons ═══
var I = {
  mic: '<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>',
  plus: '<svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"><path d="M12 5v14M5 12h14"/></svg>',
  play: '<svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M6 3l14 9-14 9z"/></svg>',
  pause: '<svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="3" width="4" height="18" rx="1"/><rect x="14" y="3" width="4" height="18" rx="1"/></svg>',
  stop: '<svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><rect x="5" y="5" width="14" height="14" rx="2"/></svg>',
  list: '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M4 6h16M4 12h16M4 18h12"/></svg>',
  gear: '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="3"/><path d="M12 1v2m0 18v2M4.22 4.22l1.42 1.42m12.72 12.72 1.42 1.42M1 12h2m18 0h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>',
  clock: '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>'
};

// ═══ State ═══
var apps = [];         // loaded from /api/apps
var pollingTimer = null;

// ═══ Init ═══
function init() {
  updateClock(); setInterval(updateClock, 30000);
  fetchApps();  // first load
  pollingTimer = setInterval(fetchApps, 5000);  // live refresh

  document.getElementById('taskGrid').addEventListener('click', function(e) {
    var b = e.target.closest('[data-action]');
    if (!b) return;
    var act = b.dataset.action, id = b.dataset.appid;
    if (act==='start') startTask(id);
    else if (act==='pause') pauseTask(id);
    else if (act==='stop') stopTask(id);
    else if (act==='detail') showDetail(id);
    else if (act==='config') showConfig(id);
    e.stopPropagation();
  });
  document.getElementById('addAppModal').addEventListener('click', function(e){ if(e.target===this) closeAddModal(); });
  document.getElementById('configModal').addEventListener('click', function(e){ if(e.target===this) closeConfigModal(); });
  document.getElementById('detailModal').addEventListener('click', function(e){ if(e.target===this) closeDetailModal(); });
}

function updateClock() {
  var d = new Date(), days = ['日','一','二','三','四','五','六'];
  document.getElementById('clock').textContent =
    d.getFullYear()+'/'+(d.getMonth()+1)+'/'+d.getDate()+' 周'+days[d.getDay()]+' '+
    String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');
}

// ═══ Data Fetch ═══
function fetchApps() {
  fetch('/api/apps').then(function(r){ return r.json(); }).then(function(data) {
    apps = data.map(function(a) { return mapApp(a); });
    updateStats();
    patchCards();
  }).catch(function() { /* server not ready yet */ });
}

function mapApp(api) {
  return {
    id: api.app_name === '漂漂' ? 'piaopiao' : (api.app_name === '梦音' ? 'mengyin' : api.app_name.toLowerCase()),
    name: api.app_name,
    subtitle: api.mode === 'rest' ? 'REST API' : (api.mode === 'frida_nim' ? 'Frida NIM' : ''),
    status: api.status,
    mode: api.mode === 'rest' ? 'REST' : 'Frida',
    totalRooms: api.total_rooms,
    doneRooms: api.done_rooms,
    sent: api.sent,
    failed: api.failed,
    interval: api.interval,
    currentRoom: api.current_room || null,
    dataSource: api.data_source,
    period: api.period,
    gender: api.gender
  };
}

// ═══ Stats Bar ═══
function updateStats() {
  var totalSent = 0, active = 0, totalAttempts = 0, doneRooms = 0;
  apps.forEach(function(a) {
    totalSent += a.sent;
    doneRooms += a.doneRooms;
    totalAttempts += a.sent + a.failed;
    if (a.status === 'running') active++;
  });
  var rate = totalAttempts > 0 ? Math.round(totalSent / totalAttempts * 100) : 100;

  document.getElementById('statSent').textContent = totalSent;
  document.getElementById('statActive').textContent = active;
  document.getElementById('statRate').textContent = rate + '%';
  document.getElementById('statRooms').textContent = doneRooms;
}

// ═══ Targeted Card Patching ═══
var cardCache = {}; // appId -> last known HTML state

function patchCards() {
  // Ensure empty slot at end
  var hasEmpty = apps.some(function(a) { return a.id === 'empty'; });
  if (!hasEmpty) apps.push({ id: 'empty', type: 'empty' });

  var grid = document.getElementById('taskGrid');
  var existingCards = {};
  grid.querySelectorAll('.card[data-appid]').forEach(function(el) {
    existingCards[el.dataset.appid] = el;
  });

  apps.forEach(function(a) {
    if (a.type === 'empty') {
      if (!existingCards['empty']) {
        var el = buildEmptyCard();
        grid.appendChild(el);
        existingCards['empty'] = el;
      }
      return;
    }

    var html = cardHTML(a);
    if (cardCache[a.id] === html && existingCards[a.id]) return; // no change
    cardCache[a.id] = html;

    if (existingCards[a.id]) {
      patchCard(existingCards[a.id], a);
    } else {
      var div = document.createElement('div');
      div.innerHTML = html;
      var el = div.firstElementChild;
      el.style.animation = 'none'; // no entrance animation for late additions
      grid.insertBefore(el, grid.lastElementChild);
      existingCards[a.id] = el;
    }
  });
}

function patchCard(el, a) {
  // Update only what may have changed
  var pct = a.totalRooms ? Math.round(a.doneRooms / a.totalRooms * 100) : 0;
  var stC = a.status==='running'?'badge-run':(a.status==='paused'?'badge-pause':'badge-idle');
  var stL = a.status==='running'?'运行中':(a.status==='paused'?'已暂停':'待开始');
  var bC  = a.status==='running'?'running':(a.status==='paused'?'paused':'');
  var pC  = pct===100?'done':(a.status==='paused'?'paused':'');
  var room = a.status==='running'?'当前: '+a.currentRoom:(a.status==='paused'?'停在: '+a.currentRoom:'');

  // Status badge
  var badge = el.querySelector('.badge');
  if (badge) {
    badge.className = 'badge ' + stC;
    badge.innerHTML = '<span class="badge-dot"></span>' + stL;
  }

  // Card border class
  el.className = el.className.replace(/running|paused/g, '').trim();
  if (bC) el.classList.add(bC);

  // Progress bar
  var pb = el.querySelector('.pb-fill');
  if (pb) { pb.style.width = pct + '%'; pb.className = 'pb-fill ' + pC; }

  // Stats text
  var statEls = el.querySelectorAll('.stats b');
  if (statEls[0]) statEls[0].textContent = a.doneRooms + '/' + a.totalRooms;
  if (statEls[1]) statEls[1].textContent = a.sent;
  if (statEls[2]) statEls[2].textContent = a.failed;

  // Current room
  var cr = el.querySelector('.current-room');
  if (cr) {
    if (room) { cr.innerHTML = I.clock + ' ' + room; cr.style.display = ''; }
    else { cr.style.display = 'none'; }
  }

  // Buttons
  var actions = el.querySelector('.actions');
  if (actions) actions.innerHTML = buttonHTML(a);
}

function cardHTML(a) {
  var pct = a.totalRooms ? Math.round(a.doneRooms / a.totalRooms * 100) : 0;
  var stC = a.status==='running'?'badge-run':(a.status==='paused'?'badge-pause':'badge-idle');
  var stL = a.status==='running'?'运行中':(a.status==='paused'?'已暂停':'待开始');
  var bC  = a.status==='running'?'running':(a.status==='paused'?'paused':'');
  var pC  = pct===100?'done':(a.status==='paused'?'paused':'');
  var room = a.status==='running'?'当前: '+a.currentRoom:(a.status==='paused'?'停在: '+a.currentRoom:'');
  return '<div class="card '+bC+'" data-appid="'+a.id+'">'
    +'<div class="card-header"><div class="name"><span class="icon">'+I.mic+'</span>'+a.name
    +' <span class="subtitle">'+a.subtitle+'</span></div>'
    +'<div class="badge '+stC+'"><span class="badge-dot"></span>'+stL+'</div></div>'
    +'<div class="pb-track"><div class="pb-fill '+pC+'" style="width:'+pct+'%"></div></div>'
    +'<div class="stats"><span class="st">房间 <b>'+a.doneRooms+'/'+a.totalRooms+'</b></span>'
    +'<span class="st">已发 <b class="ok">'+a.sent+'</b></span>'
    +'<span class="st">失败 <b class="fl">'+a.failed+'</b></span></div>'
    +(room ? '<div class="current-room">'+I.clock+' '+room+'</div>' : '')
    +'<div class="meta"><span class="tag hl">'+a.mode+'</span>'
    +'<span class="tag">间隔 '+a.interval+'s</span>'
    +'<span class="tag">'+a.dataSource+'</span>'
    +'<span class="tag">'+a.period+'</span>'
    +'<span class="tag">'+a.gender+'</span></div>'
    +'<div class="actions">'+buttonHTML(a)+'</div></div>';
}

function buttonHTML(a) {
  var btns = '';
  if (a.status === 'idle')
    btns = '<div class="btn btn-success" data-action="start" data-appid="'+a.id+'">'+I.play+' 开始群发</div>';
  else if (a.status === 'running')
    btns = '<div class="btn btn-warning" data-action="pause" data-appid="'+a.id+'">'+I.pause+' 暂停</div>'
      +'<div class="btn btn-danger" data-action="stop" data-appid="'+a.id+'">'+I.stop+' 停止</div>';
  else if (a.status === 'paused')
    btns = '<div class="btn btn-success" data-action="start" data-appid="'+a.id+'">'+I.play+' 继续</div>'
      +'<div class="btn btn-danger" data-action="stop" data-appid="'+a.id+'">'+I.stop+' 停止</div>';
  btns += '<div class="btn btn-ghost" data-action="detail" data-appid="'+a.id+'">'+I.list+' 详情</div>';
  btns += '<div class="btn btn-ghost" data-action="config" data-appid="'+a.id+'">'+I.gear+' 设置</div>';
  return btns;
}

function buildEmptyCard() {
  var div = document.createElement('div');
  div.className = 'card empty';
  div.setAttribute('data-appid', 'empty');
  div.innerHTML = I.plus + '<div style="font-size:14px;font-weight:500">添加新 App</div><div style="font-size:11px">支持 REST / Frida NIM 模式</div>';
  div.addEventListener('click', openAddModal);
  return div;
}

// ═══ Actions (call API) ═══
function startTask(id) {
  fetch('/api/app/'+encodeURIComponent(id)+'/start', {method:'POST'}).then(function(r){return r.json()}).then(function(d) {
    if (d.success) { toast('已开始'); fetchApps(); } else { toast('启动失败'); }
  });
}
function pauseTask(id) {
  fetch('/api/app/'+encodeURIComponent(id)+'/pause', {method:'POST'}).then(function(r){return r.json()}).then(function(d) {
    if (d.success) { toast('已暂停'); fetchApps(); } else { toast('暂停失败'); }
  });
}
function stopTask(id) {
  if (!confirm('确认停止？')) return;
  fetch('/api/app/'+encodeURIComponent(id)+'/stop', {method:'POST'}).then(function(r){return r.json()}).then(function(d) {
    if (d.success) { toast('已停止'); fetchApps(); } else { toast('停止失败'); }
  });
}
function refreshAll() { fetchApps(); toast('已刷新'); }

function showDetail(id) {
  window.location.href = '/app/' + encodeURIComponent(id);
}
function showConfig(id) {
  var a = apps.find(function(x){return x.id===id}); if (!a) return;
  document.getElementById('configContent').innerHTML =
    '<h3>'+a.name+' 设置</h3>'
    +'<label>发信间隔（秒）</label><input value="'+a.interval+'" type="number" min="1" max="60">'
    +'<label>数据源</label><select><option>'+a.dataSource+'</option></select>'
    +'<label>时段</label><select><option>'+a.period+'</option></select>'
    +'<label>性别筛选</label><select><option>'+a.gender+'</option></select>'
    +'<label>话术模板（一行一条，{nick}=昵称）</label>'
    +'<textarea style="height:80px">{nick}你好，来我房间玩嘛~\n{nick}在吗？聊聊呀\n{nick}哈喽~</textarea>'
    +'<div class="btn-row"><div class="btn btn-ghost" onclick="closeConfigModal()">关闭</div><div class="btn btn-primary" onclick="closeConfigModal()">保存</div></div>';
  document.getElementById('configModal').classList.remove('hidden');
}

// Modals
function openAddModal()   { document.getElementById('addAppModal').classList.remove('hidden'); }
function closeAddModal()  { document.getElementById('addAppModal').classList.add('hidden'); }
function closeConfigModal(){ document.getElementById('configModal').classList.add('hidden'); }
function closeDetailModal(){ document.getElementById('detailModal').classList.add('hidden'); }

function addApp() {
  var n = document.getElementById('newAppName').value.trim() || '新 App';
  apps.splice(apps.length-1, 0, {id:'app'+Date.now(), name:n, subtitle:'待配置', status:'idle', mode:'REST',
    totalRooms:0, doneRooms:0, sent:0, failed:0, interval:4, currentRoom:null,
    dataSource:'贡献榜', period:'今日', gender:'全部'});
  closeAddModal(); document.getElementById('newAppName').value = '';
  cardCache = {}; patchCards(); updateStats();
  toast(n+' 已添加');
}

function toast(m) {
  var e = document.getElementById('toast'); e.textContent = m; e.classList.remove('hidden');
  clearTimeout(e._t); e._t = setTimeout(function(){ e.classList.add('hidden'); }, 2500);
}

document.addEventListener('keydown', function(e) { if (e.key==='Escape') { closeAddModal(); closeConfigModal(); closeDetailModal(); } });
window.addEventListener('load', init);
</script>
</body>
